<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>enkidu rankX — tools</title>
<style>
  :root {
    --bg: #0e0f0e;
    --panel: #151714;
    --text: #d6d4cc;
    --dim: #6f736c;
    --line: #2a2d29;
    --rec: #e0342f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  main { width: 100%; max-width: 640px; margin: 0 auto; padding: 48px 20px; flex: 1; }

  header { margin-bottom: 40px; }
  h1 { font-size: 15px; font-weight: 400; letter-spacing: 0.04em; }
  h1 b { font-weight: 700; }
  .sub { color: var(--dim); font-size: 12px; margin-top: 4px; }

  .strip {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 14px 10px;
    border-top: 1px solid var(--line);
    text-decoration: none;
    color: var(--text);
  }
  .strip:last-of-type { border-bottom: 1px solid var(--line); }
  .ch { color: var(--dim); font-size: 12px; min-width: 5ch; }
  .rec {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--line);
    align-self: center;
    flex-shrink: 0;
    transition: background 120ms linear;
  }
  .name { font-weight: 700; }
  .desc { color: var(--dim); font-size: 12px; margin-left: auto; text-align: right; }
  .strip:hover, .strip:focus-visible { background: var(--panel); outline: none; }
  .strip:hover .rec, .strip:focus-visible .rec { background: var(--rec); }
  .strip:focus-visible { box-shadow: inset 2px 0 0 var(--rec); }

  footer {
    width: 100%; max-width: 640px; margin: 0 auto;
    padding: 20px; color: var(--dim); font-size: 12px;
  }
  footer a { color: var(--dim); }
  footer a:hover { color: var(--text); }

  @media (max-width: 480px) {
    .strip { flex-wrap: wrap; }
    .desc { margin-left: calc(5ch + 22px); text-align: left; width: 100%; }
  }
  @media (prefers-reduced-motion: reduce) {
    .rec { transition: none; }
  }
</style>
</head>
<body>
<main>
  <header>
    <h1><b>enkidu rankX</b> — tools</h1>
    <div class="sub">browser instruments · kein login, keine daten, einfach spielen</div>
  </header>
  <nav id="rack" aria-label="Tools"></nav>
</main>
<footer>
  <a href="https://enkidu-rankx.de">enkidu-rankx.de</a> · <a href="https://sondage.bandcamp.com">bandcamp</a>
</footer>
<script>
// ── Neues Tool hinzufügen: eine Zeile ergänzen, HTML-Datei ins Repo legen. ──
const TOOLS = [
  { file: "four-track-v1_7.html",        name: "Porta-4",           desc: "4-Spur-Recorder, Portastudio-Stil" },
  { file: "four-track-v1_4.html",        name: "Porta-4 v1.4",      desc: "Vorgängerversion" },
  { file: "rhythm-builder-v2_0.html",    name: "Rhythm Builder",    desc: "Drum Machine" },
  { file: "vell_chord_builder_v12.html", name: "Vell Chord Builder", desc: "Harmonik-Werkzeug" },
  { file: "speaknspell.html",            name: "LPC Voice",         desc: "Speak & Spell Sprachsynthese" },
];

document.getElementById("rack").innerHTML = TOOLS.map((t, i) => `
  <a class="strip" href="${t.file}">
    <span class="ch">CH ${String(i + 1).padStart(2, "0")}</span>
    <span class="rec" aria-hidden="true"></span>
    <span class="name">${t.name}</span>
    <span class="desc">${t.desc}</span>
  </a>`).join("");
</script>
</body>
</html>
